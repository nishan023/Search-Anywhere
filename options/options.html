<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Anywhere — Settings</title>
  <link rel="stylesheet" href="options.css">
  <link rel="icon" type="image/png" href="../icons/icon16.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon48.png" alt="Search Anywhere" class="logo" id="logo-img">
        <div class="header-text">
          <h1 class="header-title">Search Anywhere</h1>
          <p class="header-subtitle">Customize your right-click search experience</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="import-btn" class="btn btn-ghost" title="Import sites from JSON">
          <i class="fa-solid fa-file-import"></i> Import
        </button>
        <button id="export-btn" class="btn btn-ghost" title="Export sites to JSON">
          <i class="fa-solid fa-file-export"></i> Export
        </button>
        <button id="add-btn" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> Add Site
        </button>
      </div>
    </header>

    <!-- Category tabs -->
    <div class="tabs-wrapper">
      <div class="category-tabs" id="category-tabs">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Main content -->
    <main class="main">
      <div class="sites-grid" id="sites-grid">
        <!-- Generated by JS -->
      </div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        <p class="empty-title">No sites here</p>
        <p class="empty-sub">Add a site to get started</p>
        <button class="btn btn-primary" id="empty-add-btn"><i class="fa-solid fa-plus"></i> Add Site</button>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-credit">Developed by <a href="https://github.com/nishan023" target="_blank" class="credit-link">nishan</a></div>
      <a href="https://github.com/nishan023/Search-Anywhere" target="_blank" class="footer-github tooltip-left" data-tooltip="Source Code">
        <i class="fa-brands fa-github"></i> Source Code
      </a>
    </footer>

  </div><!-- /.app -->

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">    
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add Site</h2>
        <button class="modal-close" id="modal-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">

        <div class="form-group">
          <label class="form-label" for="form-name">Name</label>
          <input
            type="text"
            id="form-name"
            class="form-input"
            placeholder="e.g. IMDb"
            autocomplete="off"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="form-category">Category</label>
          <input
            type="text"
            id="form-category"
            class="form-input"
            placeholder="e.g. Movies"
            list="categories-datalist"
            autocomplete="off"
          >
          <datalist id="categories-datalist"></datalist>
        </div>

        <div class="form-group">
          <label class="form-label" for="form-url">
            Search URL
            <span class="form-hint">Use <code>%s</code> as placeholder for the search text</span>
          </label>
          <input
            type="url"
            id="form-url"
            class="form-input"
            placeholder="https://example.com/search?q=%s"
            autocomplete="off"
          >
        </div>

        <div class="url-preview" id="url-preview">
          <span class="preview-label">Preview →</span>
          <span class="preview-url" id="preview-url-text">—</span>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel"><i class="fa-solid fa-xmark"></i> Cancel</button>
        <button class="btn btn-primary" id="modal-save"><i class="fa-solid fa-floppy-disk"></i> Save Site</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal-overlay" id="confirm-modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title">Delete Site</h2>
        <button class="modal-close" id="confirm-modal-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p id="confirm-modal-text" style="font-size: 0.95rem; color: var(--text); line-height: 1.4;"></p>
        <p class="form-hint" style="margin-top: 4px;">This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirm-modal-cancel"><i class="fa-solid fa-xmark"></i> Cancel</button>
        <button class="btn btn-danger" id="confirm-modal-confirm"><i class="fa-solid fa-trash"></i> Delete</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" style="display:none" aria-hidden="true">

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="options.js"></script>
</body>
</html>
